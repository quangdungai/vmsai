version: '3.8'

services:
  face-attendance:
    build: .
    container_name: face_attendance
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # Persist embeddings, logs, images
      - ./models:/app/models      # Cache downloaded models
    environment:
      - CAMERA_SOURCE=rtsp://admin:admin@192.168.1.100:554/stream1
      # - CAMERA_SOURCE=0          # USB camera
      - RECOGNITION_THRESHOLD=0.45
      - FAS_FINAL_THRESHOLD=0.80
      - ATTENDANCE_COOLDOWN_MINUTES=30
      - LOG_LEVEL=INFO
    devices:
      # Uncomment để dùng USB camera
      # - /dev/video0:/dev/video0
      # Uncomment để dùng GPU
      # - /dev/nvidia0:/dev/nvidia0
    deploy:
      resources:
        limits:
          memory: 4G
        # Uncomment cho GPU
        # reservations:
        #   devices:
        #     - capabilities: [gpu]
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3

