# VMS247 MVP1 — hạ tầng phụ trợ (tối thiểu, "Compose first").
# Phase 1a chạy app trực tiếp bằng python; compose dành cho store dùng chung.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vms247}
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Gán nhãn model-assisted (vòng teacher->student). Bật khi cần.
  # label-studio:
  #   image: heartexlabs/label-studio:latest
  #   ports: ["8080:8080"]
  #   volumes: ["./data/labelstudio:/label-studio/data"]

volumes:
  pgdata:
